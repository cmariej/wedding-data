questions:
  - question: Gibt es Mittagessen?
    answer: >
      Nein, aufgrund der geplanten Fotosession und des Location-Wechsels bleibt leider keine Zeit für Mittagessen.
      Plane daher bitte ein ausreichendes Frühstück vor der Trauung ein.

  - question: Darf ich eine Begleitung mitbringen?
    answer: >
      Wir möchten gerne in einem möglichst kleinen Rahmen feiern.
      Daher wäre es gut, wenn ihr keine Begleitung einplant.
      Wenn Paare/Familien eingeladen wurden, wurde die Einladung bereits dementsprechend adressiert.
